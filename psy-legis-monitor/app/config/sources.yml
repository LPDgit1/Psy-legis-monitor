gazzetta:
  enabled: true
  fetch_method: "auto"
  max_issues_per_series: 1
  fetch_act_text: false
  series:
    - name: "Serie Generale"
      enabled: true
      source: "Gazzetta Ufficiale - Serie Generale"
      level: "nazionale"
      list_url: "https://www.gazzettaufficiale.it/30giorni/serie_generale"

    - name: "3a Serie Speciale - Regioni"
      enabled: true
      source: "Gazzetta Ufficiale - 3a Serie Speciale Regioni"
      level: "regionale"
      list_url: "https://www.gazzettaufficiale.it/30giorni/regioni"

camera:
  enabled: true
  endpoint_url: "https://dati.camera.it/sparql"
  legislature_uri: "http://dati.camera.it/ocd/legislatura.rdf/repubblica_19"
  fetch_method: "auto"
  timeout: 30
  limit: 30

senato:
  enabled: true
  endpoint_url: "https://dati.senato.it/sparql"
  legislature: 19
  fetch_method: "auto"
  timeout: 30
  limit: 30

normattiva:
  enabled: true
  homepage_url: "https://www.normattiva.it/"
  approved_not_published_url: "https://www.parlamento.it/leg/ldl_new/v3/sldlelencoddlappnonpub.htm"
  fetch_method: "auto"
  timeout: 30
  max_items: 30

ministero_salute:
  enabled: true
  sources:
    - name: "Ministero Salute - Norme e atti"
      enabled: true
      source: "Ministero della Salute - Norme e atti"
      level: "nazionale"
      region:
      act_type: "altro"
      status: "pubblicato"
      url: "https://www.salute.gov.it/new/it/sezione/norme-e-atti/"
      source_type: "html"
      fetch_method: "auto"
      max_items: 40
      include_patterns:
        - "norme"
        - "atti"
        - "decreto"
        - "ordinanza"
        - "linee guida"
        - "professioni sanitarie"
        - "psicolog"
        - "psicoterapia"
        - "counsel"
        - "salute mentale"
        - "bonus psicologo"
        - "consultori"
        - "neuropsichiatria"
        - "dipendenze"
        - "disturbi alimentari"
        - "suicidio"
        - "telemedicina"
        - "fascicolo sanitario"
        - "PNRR"
        - "LEA"
      exclude_patterns:
        - "Cookie"
        - "Privacy"
        - "Facebook"
        - "Instagram"
        - "Youtube"
        - "Linkedin"

agenas:
  enabled: true
