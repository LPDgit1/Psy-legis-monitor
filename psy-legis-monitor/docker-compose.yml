services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-psy_legis_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-psy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local environment}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-psy} -d ${POSTGRES_DB:-psy_legis_monitor}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-psy}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local environment}@postgres:5432/${POSTGRES_DB:-psy_legis_monitor}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8501:8501"
    volumes:
      - .:/app

volumes:
  postgres_data:
